<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zap Remote</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 4px;
}
.card {
  background: #16213e;
  border-radius: 12px;
  padding: 16px;
  margin-top: 12px;
  margin-bottom: 12px;
}
.card h2 { font-size: 1rem; margin-bottom: 10px; color: #a0c4ff; }
label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #bbb; }
input[type="time"], input[type="text"], select {
  width: 100%;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #0f3460;
  color: #fff;
  font-size: 2rem;
  margin-bottom: 8px;
  -webkit-appearance: none;
}

/* Styles for the time input */
#startTime {
  text-align: center;
  font-family: "SF Mono", Menlo, Monaco, Consolas, "Courier New", monospace;
  letter-spacing: 2px;
  font-size: 3rem;
  font-weight: bold;
  padding: 15px 10px;
  margin-top: 4px;
  margin-bottom: 16px;
}

/* Center the text in the time picker for WebKit browsers */
#startTime::-webkit-datetime-edit {
  text-align: center;
}
#startTime::-webkit-datetime-edit-fields-wrapper {
  justify-content: center;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 8px;
}
button:active { transform: scale(0.97); }
.btn-connect { background: #0077b6; color: #fff; }
.btn-disconnect { background: #e63946; color: #fff; }
.btn-alarm { background: #e76f51; color: #fff; }
.btn-zap { background: #f4a261; color: #000; }
.btn-read { background: #457b9d; color: #fff; }
.btn-secondary { background: #333; color: #ccc; }
.btn-sync { background: #6a4c93; color: #fff; }
button:disabled, input:disabled { opacity: 0.4; cursor: default; }
#log {
  background: #0a0a1a;
  border-radius: 8px;
  padding: 10px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 0.75rem;
  white-space: pre-wrap;
  word-break: break-all;
  color: #8ecae6;
}

.row { display: flex; gap: 8px; }
.row > * { flex: 1; }
</style>
</head>
<body>

<div class="card">
  <div id="savedDevices"></div>
  <button id="btnConnect" class="btn-connect" onclick="connectDevice()">Scan & Connect</button>
  <button id="btnDisconnect" class="btn-disconnect" style="display: none;" onclick="disconnectDevice()">Disconnect</button>
</div>

<div class="card">
  <input type="text" id="startTime" value="--:--" disabled>
  <button id="btnSetAlarms" class="btn-alarm" onclick="setAlarms()" disabled>Set 5 Alarms (1 min apart)</button>
</div>

<div class="card">
  <details>
    <summary style="font-size: 1rem; color: #a0c4ff; font-weight: bold; cursor: pointer;">Quick Actions</summary>
    <div style="margin-top: 10px;">
      <button id="btnZap" class="btn-zap" onclick="sendCmd('light=01')" disabled>Zap</button>
      <button id="btnSyncTime" class="btn-sync" onclick="syncTime()" disabled>Sync Time</button>
      <button id="btnVersion" class="btn-secondary" onclick="sendCmd('version=?')" disabled>Version</button>
      <button id="btnReadTimer" class="btn-secondary" onclick="sendCmd('sittimes=?')" disabled>Read Timer</button>
      <button id="btnReadAlarms" class="btn-read" onclick="readAlarms()" disabled>Read Alarms</button>
    </div>
  </details>
</div>

<div class="card">
  <button class="btn-secondary" onclick="clearLog()" style="width:auto;margin-bottom:6px;padding:6px 12px;font-size:0.75rem">Clear Log</button>
  <div id="log"></div>
</div>

<script>
const SERVICE_UUID = '0000ff01-0000-1000-8000-00805f9b34fb';
const CHAR_UUID = '0000ff02-0000-1000-8000-00805f9b34fb';
const STORAGE_KEY = 'zap_saved_devices';

let device = null;
let server = null;
let characteristic = null;
let rxAccumulator = '';
let lastSelectedTime = '09:00'; // Fallback starting time

function log(msg) {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString([], { hour12: false });
  el.textContent += `[${ts}] ${msg}\n`;
  // Without max-height, scrolling the container doesn't do much, 
  // but if the window needs to scroll to see the new log, we can use this:
  // window.scrollTo(0, document.body.scrollHeight);
}

function setConnectedUI(connected) {
  const btn = document.getElementById('btnConnect');
  const savedContainer = document.getElementById('savedDevices');
  const startTimeInput = document.getElementById('startTime');

  // Toggle visibility of the connect buttons based on connection state
  if (connected) {
    btn.style.display = 'none';
    savedContainer.style.display = 'none';
    
    // Enable and restore time input
    startTimeInput.type = 'time';
    startTimeInput.value = lastSelectedTime;
    startTimeInput.disabled = false;
  } else {
    savedContainer.style.display = 'block';
    renderSavedDevices(); // This handles showing/hiding btnConnect based on saved devices
    
    // Save previous time and turn into placeholder
    if (startTimeInput.type === 'time' && startTimeInput.value) {
      lastSelectedTime = startTimeInput.value;
    }
    startTimeInput.type = 'text';
    startTimeInput.value = '--:--';
    startTimeInput.disabled = true;
  }

  document.getElementById('btnDisconnect').style.display = connected ? 'block' : 'none';
  document.getElementById('btnSetAlarms').disabled = !connected;
  document.getElementById('btnReadAlarms').disabled = !connected;
  document.getElementById('btnZap').disabled = !connected;
  document.getElementById('btnSyncTime').disabled = !connected;
  document.getElementById('btnVersion').disabled = !connected;
  document.getElementById('btnReadTimer').disabled = !connected;
}

function hasBluetooth() {
  return !!(navigator.bluetooth && navigator.bluetooth.requestDevice);
}

// --- Saved Devices ---
function getSavedDevices() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveDevice(id, name) {
  const devices = getSavedDevices();
  if (devices.find(d => d.id === id)) return;
  devices.push({ id, name });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(devices));
  renderSavedDevices();
}

function removeDevice(id) {
  const devices = getSavedDevices().filter(d => d.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(devices));
  renderSavedDevices();
}

function renderSavedDevices() {
  const container = document.getElementById('savedDevices');
  const btnConnect = document.getElementById('btnConnect');
  const devices = getSavedDevices();
  const isConnected = (device && device.gatt && device.gatt.connected);

  if (devices.length === 0) {
    container.innerHTML = '';
    if (!isConnected) btnConnect.style.display = 'block';
    return;
  }

  // If we're disconnected and there are saved devices, hide the generic Scan button
  if (!isConnected) {
    btnConnect.style.display = 'none';
  }

  container.innerHTML = devices.map(d => `
    <div class="row" style="margin-bottom: 8px;">
      <button class="btn-connect" style="flex: 1; margin-bottom: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" onclick="connectToSaved('${d.id}','${d.name}')">
        Connect ${d.name || d.id}
      </button>
      <button class="btn-disconnect" style="flex: 0 0 auto; width: auto; margin-bottom: 0; padding-left: 16px; padding-right: 16px;" onclick="removeDevice('${d.id}')">
        X
      </button>
    </div>
  `).join('');
}

// --- BLE ---
function onDisconnected() {
  log('Device disconnected');
  setConnectedUI(false);
  characteristic = null;
  server = null;
}

async function finishConnect() {
  device.addEventListener('gattserverdisconnected', onDisconnected);
  server = await device.gatt.connect();
  log('GATT connected');

  const service = await server.getPrimaryService(SERVICE_UUID);
  characteristic = await service.getCharacteristic(CHAR_UUID);

  await characteristic.startNotifications();
  characteristic.addEventListener('characteristicvaluechanged', onNotification);
  log('Notifications enabled');

  setConnectedUI(true);
  saveDevice(device.id, device.name || device.id);

  // Sync the time automatically upon a successful connection
  log('Setting time on connect...');
  await syncTime();

  // Read current alarms and update UI
  await readAlarms();
}

async function connectToSaved(id, name) {
  if (!hasBluetooth()) return;
  try {
    // Try getDevices() first — reconnects without picker
    if (navigator.bluetooth.getDevices) {
      const granted = await navigator.bluetooth.getDevices();
      const match = granted.find(d => d.id === id || d.name === name);
      if (match) {
        log(`Auto-reconnecting to ${match.name || match.id}...`);
        device = match;
        await finishConnect();
        return;
      }
    }
    // Fall back to filtered picker
    log(`Scanning for ${name}...`);
    await connectDevice(name);
  } catch (e) {
    log(`Reconnect failed, opening picker: ${e.message || e}`);
    await connectDevice(name);
  }
}

async function connectDevice(filterName) {
  if (!hasBluetooth()) {
    log('Web Bluetooth not available. Use Bluefy (iOS) or Chrome (desktop).');
    return;
  }
  try {
    let options;
    if (filterName) {
      options = { filters: [{ name: filterName }], optionalServices: [SERVICE_UUID] };
    } else {
      options = { acceptAllDevices: true, optionalServices: [SERVICE_UUID] };
    }

    device = await navigator.bluetooth.requestDevice(options);
    log(`Selected: ${device.name || device.id}`);
    await finishConnect();
  } catch (e) {
    // If name filter fails (Bluefy), retry with acceptAllDevices
    if (filterName && e.name !== 'NotFoundError') {
      log(`Filtered scan failed, showing all devices...`);
      try {
        device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true, optionalServices: [SERVICE_UUID]
        });
        log(`Selected: ${device.name || device.id}`);
        await finishConnect();
        return;
      } catch (e2) {
        log(`Error: ${e2.message || e2}`);
      }
    } else {
      log(`Error: ${e.message || e}`);
    }
    setConnectedUI(false);
  }
}

async function disconnectDevice() {
  try {
    if (device && device.gatt && device.gatt.connected) {
      device.gatt.disconnect();
    }
  } catch (e) {
    log(`Disconnect error: ${e.message || e}`);
  }
}

function onNotification(event) {
  const value = event.target.value;
  const bytes = new Uint8Array(value.buffer);
  let text = '';
  for (let i = 0; i < bytes.length; i++) {
    if (bytes[i] !== 0) text += String.fromCharCode(bytes[i]);
  }
  log(`[RX] ${text}`);
  rxAccumulator += text;
}

async function writeChar(data) {
  if (characteristic.writeValueWithResponse) {
    await characteristic.writeValueWithResponse(data);
  } else {
    await characteristic.writeValue(data);
  }
}

async function sendCmd(cmd) {
  if (!characteristic) { log('Not connected'); return; }
  try {
    log(`[TX] ${cmd}`);
    const encoder = new TextEncoder();
    const initialLen = rxAccumulator.length;

    await writeChar(encoder.encode(cmd));

    // Always wait for a result up to 500ms
    // Check every 50ms (up to 10 times) to see if new data arrived
    for (let i = 0; i < 10; i++) {
      await new Promise(r => setTimeout(r, 50));
      if (rxAccumulator.length > initialLen) {
        // Data has started arriving, give it an extra 50ms to finish streaming
        await new Promise(r => setTimeout(r, 50));
        break;
      }
    }

  } catch (e) {
    log(`Write error: ${e.message || e}`);
  }
}

// --- Alarms ---
function generateAlarms(startTime) {
  const [startHour, startMinute] = startTime.split(':').map(Number);
  const alarms = [];
  for (let i = 0; i < 5; i++) {
    const totalMinutes = startMinute + i;
    const h = (startHour + Math.floor(totalMinutes / 60)) % 24;
    const m = totalMinutes % 60;
    const n = i;
    const p = i + 1;
    alarms.push(
      `altimes=21h=${String(h).padStart(2,'0')}m=${String(m).padStart(2,'0')}n=${String(n).padStart(2,'0')}m=0p=${String(p).padStart(2,'0')}on=1w=7f`
    );
  }
  return alarms;
}

async function setAlarms() {
  const time = document.getElementById('startTime').value;
  if (!time || !/^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/.test(time)) { 
    log('Error: Enter a valid time'); 
    return; 
  }
  
  const alarms = generateAlarms(time);
  const btn = document.getElementById('btnSetAlarms');
  btn.disabled = true;
  
  // Calculate expected length (one alarm line length * 5) + header length
  const expectedDataLen = alarms[0].length * 5 + 21;
  
  for (let attempt = 1; attempt <= 3; attempt++) {
    log(`Setting alarms (Attempt ${attempt}/3)...`);
    for (const cmd of alarms) {
      await sendCmd(cmd);
      // Removed the fixed 300ms delay here because sendCmd now inherently waits for results
    }
    
    log('Requesting verification...');
    rxAccumulator = ''; // clear buffer before reading
    await sendCmd('alarm=?');
    
    // Smart polling: stop waiting once we receive enough characters
    for (let poll = 0; poll < 15; poll++) {
      if (rxAccumulator.length >= expectedDataLen) {
        break; // We have enough data! Stop waiting immediately.
      }
      await new Promise(r => setTimeout(r, 200));
    }
    
    let allFound = true;
    for (let i = 0; i < 5; i++) {
      const match = alarms[i].match(/h=(\d{2})m=(\d{2})/);
      if (match) {
        const expectStr = `h=${match[1]}m=${match[2]}`;
        if (!rxAccumulator.includes(expectStr)) {
          allFound = false;
          break;
        }
      }
    }
    
    if (allFound) {
      log('✅ All 5 alarms verified successfully!');
      if (device && device.gatt && device.gatt.connected) btn.disabled = false;
      return;
    } else {
      log(`❌ Verification failed on attempt ${attempt}.`);
    }
  }
  
  log('⚠️ Failed to verify all alarms after 3 attempts.');
  if (device && device.gatt && device.gatt.connected) btn.disabled = false;
}

async function readAlarms() {
  log('Reading alarms...');
  rxAccumulator = '';
  await sendCmd('alarm=?');
  
  // Wait for data to arrive
  for (let poll = 0; poll < 15; poll++) {
    if (rxAccumulator.includes('h=') && rxAccumulator.includes('m=')) {
      await new Promise(r => setTimeout(r, 200)); // allow buffer to fill
      break;
    }
    await new Promise(r => setTimeout(r, 200));
  }
  
  // Parse the first alarm found
  const match = rxAccumulator.match(/h=(\d{2})m=(\d{2})/);
  if (match) {
    const timeStr = `${match[1]}:${match[2]}`;
    const startTimeInput = document.getElementById('startTime');
    if (startTimeInput.type === 'time') {
       startTimeInput.value = timeStr;
       lastSelectedTime = timeStr;
    }
    log(`Updated picker to ${timeStr}`);
  } else {
    log('No parsed alarms found.');
  }
}

async function syncTime() {
  const now = new Date();
  const ts = [
    now.getFullYear(),
    String(now.getMonth() + 1).padStart(2, '0'),
    String(now.getDate()).padStart(2, '0'),
    String(now.getHours()).padStart(2, '0'),
    String(now.getMinutes()).padStart(2, '0'),
    String(now.getSeconds()).padStart(2, '0')
  ].join('');
  await sendCmd(`tset=${ts}`);
}

function clearLog() {
  document.getElementById('log').textContent = '';
}

// Init
renderSavedDevices();

// Auto-reconnect to last used device on page load
(async function autoReconnect() {
  if (!hasBluetooth() || !navigator.bluetooth.getDevices) return;
  const saved = getSavedDevices();
  if (saved.length === 0) return;
  try {
    const granted = await navigator.bluetooth.getDevices();
    // Try the most recently saved device first
    for (const s of saved.slice().reverse()) {
      const match = granted.find(d => d.id === s.id || d.name === s.name);
      if (match) {
        log(`Auto-reconnecting to ${match.name || match.id}...`);
        device = match;
        await finishConnect();
        return;
      }
    }
  } catch (e) {
    log(`Auto-reconnect unavailable: ${e.message || e}`);
  }
})();
</script>
</body>
</html>
